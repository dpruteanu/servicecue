<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760" role="img" aria-labelledby="title desc">
  <title id="title">ServiceCue Live Mode Reference</title>
  <desc id="desc">A reference image showing ServiceCue live mode with collapsible service sections, live-safe remove confirmation, and the bottom playback controls.</desc>
  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .line { stroke: #d8dee8; stroke-width: 1.5; }
      .ink { fill: #172033; font-family: Inter, Arial, sans-serif; font-weight: 700; }
      .text { fill: #172033; font-family: Inter, Arial, sans-serif; }
      .muted { fill: #64748b; font-family: Inter, Arial, sans-serif; }
      .blue { fill: #245bdb; }
      .blue-text { fill: #245bdb; font-family: Inter, Arial, sans-serif; font-weight: 700; }
      .button { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .section-youth { fill: #ecfdf5; stroke: #a7f3d0; }
      .section-choir { fill: #fffbeb; stroke: #fde68a; }
      .section-guest { fill: #f0f9ff; stroke: #bae6fd; }
      .section-other { fill: #eff6ff; stroke: #bfdbfe; }
      .confirm { fill: #fffbeb; stroke: #fde68a; }
    </style>
  </defs>
  <rect class="bg" width="1440" height="760" />
  <rect fill="#ffffff" width="1440" height="76" />
  <line class="line" x1="0" y1="76" x2="1440" y2="76" />
  <rect class="blue" x="28" y="20" width="40" height="40" rx="10" />
  <text class="ink" x="82" y="37" font-size="22">ServiceCue</text>
  <text class="muted" x="82" y="58" font-size="13">Local backing-track player for church services</text>
  <rect class="button" x="548" y="18" width="74" height="42" rx="7" />
  <text class="muted" x="566" y="44" font-size="14" font-weight="700">Setup</text>
  <rect class="blue" x="622" y="18" width="74" height="42" rx="7" />
  <text fill="#ffffff" font-family="Inter, Arial, sans-serif" font-weight="700" x="648" y="44" font-size="14">Live</text>
  <rect class="button" x="728" y="18" width="300" height="42" rx="7" />
  <text class="text" x="748" y="44" font-size="14">Sunday Service - 2026-06-15</text>
  <rect class="button" x="1060" y="18" width="92" height="42" rx="7" />
  <text class="ink" x="1090" y="44" font-size="14">Save</text>
  <rect class="button" x="1164" y="18" width="92" height="42" rx="7" />
  <text class="ink" x="1194" y="44" font-size="14">Load</text>
  <g transform="translate(140,108)">
    <rect class="panel" width="1160" height="420" rx="8" />
    <text class="ink" x="28" y="48" font-size="24">Service Order</text>
    <text class="muted" x="28" y="76" font-size="16">Sunday Service - 2026-06-15</text>
    <g transform="translate(28,112)">
      <rect class="section-youth" width="1104" height="128" rx="7" />
      <rect fill="#10b981" x="22" y="22" width="6" height="42" rx="3" />
      <text fill="#065f46" font-family="Inter, Arial, sans-serif" font-weight="700" x="54" y="52" font-size="22">Youth</text>
      <text class="muted" x="908" y="52" font-size="15" font-weight="700">2 songs</text>
      <line class="line" x1="0" y1="78" x2="1104" y2="78" />
      <text class="text" x="54" y="108" font-size="15">1  Hai lupta frate lupta</text>
      <text class="text" x="940" y="108" font-size="15">4:15</text>
      <rect class="blue" x="1014" y="88" width="34" height="34" rx="6" />
      <polygon fill="#ffffff" points="1026,97 1026,113 1040,105" />
      <rect fill="#fef2f2" stroke="#fecaca" x="1058" y="88" width="34" height="34" rx="6" />
      <text fill="#b91c1c" font-family="Inter, Arial, sans-serif" font-weight="700" x="1069" y="111" font-size="15">X</text>
    </g>
    <g transform="translate(28,254)">
      <rect class="confirm" width="1104" height="76" rx="7" />
      <text class="text" x="22" y="46" font-size="16" font-weight="700">Remove Fii binecuvantat from this Live run?</text>
      <rect fill="#fef2f2" stroke="#fecaca" x="772" y="18" width="110" height="40" rx="7" />
      <text fill="#b91c1c" font-family="Inter, Arial, sans-serif" font-weight="700" x="800" y="43" font-size="14">Confirm</text>
      <rect class="button" x="896" y="18" width="96" height="40" rx="7" />
      <text class="ink" x="922" y="43" font-size="14">Cancel</text>
    </g>
    <g transform="translate(28,342)">
      <rect class="section-choir" width="1104" height="56" rx="7" />
      <rect fill="#f59e0b" x="22" y="14" width="6" height="28" rx="3" />
      <text fill="#92400e" font-family="Inter, Arial, sans-serif" font-weight="700" x="54" y="36" font-size="20">Choir</text>
      <text class="muted" x="908" y="36" font-size="15" font-weight="700">1 song</text>
    </g>
  </g>
  <g transform="translate(0,570)">
    <rect fill="#ffffff" width="1440" height="190" />
    <line class="line" x1="0" y1="0" x2="1440" y2="0" />
    <text class="blue-text" x="110" y="44" font-size="15">Now Playing</text>
    <text class="ink" x="110" y="76" font-size="24">Hai lupta frate lupta</text>
    <text class="muted" x="110" y="106" font-size="16">Youth</text>
    <text class="text" x="110" y="148" font-size="18">1:42</text>
    <line stroke="#cbd5e1" stroke-width="9" stroke-linecap="round" x1="170" y1="141" x2="508" y2="141" />
    <line stroke="#245bdb" stroke-width="9" stroke-linecap="round" x1="170" y1="141" x2="306" y2="141" />
    <text class="text" x="530" y="148" font-size="18">4:15</text>
    <rect class="button" x="660" y="54" width="74" height="64" rx="7" />
    <text class="ink" x="678" y="134" font-size="13">Restart</text>
    <rect class="button" x="750" y="54" width="74" height="64" rx="7" />
    <text class="ink" x="770" y="134" font-size="13">Prev</text>
    <circle class="blue" cx="868" cy="86" r="48" />
    <rect fill="#ffffff" x="856" y="60" width="12" height="52" rx="4" />
    <rect fill="#ffffff" x="878" y="60" width="12" height="52" rx="4" />
    <text class="ink" x="846" y="152" font-size="13">Pause</text>
    <rect class="button" x="944" y="54" width="74" height="64" rx="7" />
    <text class="ink" x="966" y="134" font-size="13">Next</text>
    <rect fill="#fef2f2" stroke="#fecaca" x="1034" y="54" width="74" height="64" rx="7" />
    <rect fill="#dc2626" x="1062" y="75" width="18" height="18" rx="3" />
    <text fill="#b91c1c" font-family="Inter, Arial, sans-serif" font-weight="700" x="1054" y="134" font-size="13">Stop</text>
    <text class="text" x="1168" y="54" font-size="15">Fade Out</text>
    <rect fill="#f59e0b" x="1168" y="72" width="120" height="42" rx="7" />
    <text fill="#ffffff" font-family="Inter, Arial, sans-serif" font-weight="700" x="1197" y="98" font-size="14">Fade Out</text>
    <text class="blue-text" x="1320" y="54" font-size="15">Volume</text>
    <line stroke="#245bdb" stroke-width="8" stroke-linecap="round" x1="1320" y1="88" x2="1410" y2="88" />
    <circle class="blue" cx="1410" cy="88" r="10" />
  </g>
</svg>
