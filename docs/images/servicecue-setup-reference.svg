<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="860" viewBox="0 0 1440 860" role="img" aria-labelledby="title desc">
  <title id="title">ServiceCue Setup Mode Reference</title>
  <desc id="desc">A reference image showing ServiceCue setup mode with a library panel, collapsible schedule sections, guest import, and the bottom player.</desc>
  <defs>
